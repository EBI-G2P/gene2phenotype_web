workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "test-web-pipeline"'
      when: always

stages:
  - validate
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

validate:
  stage: validate
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --cache .npm
    - npm run build

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build -t "$DOCKER_IMAGE" .
    - docker push "$DOCKER_IMAGE"
    - docker rmi "$DOCKER_IMAGE"
    - docker logout "$CI_REGISTRY"

trigger_k8s_deploy_test:
  stage: deploy
  when: manual
  environment:
    name: test
  trigger:
    project: "$K8S_MANIFESTS_PROJECT"
    branch: "$K8S_MANIFESTS_BRANCH"
    strategy: mirror
  variables:
    APP_NAME: g2p-web
    DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    DEPLOY_ENV: test
    KUBE_CONTEXT: "$TEST_AGENT"
    KUBE_NAMESPACE: "$TEST_NS"

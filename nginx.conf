server {
    listen 8080;

    location = /gene2phenotype {
        return 301 /gene2phenotype/;
    }

    location = /gene2phenotype/index.html {
        root /usr/share/nginx/html;
        etag off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location /gene2phenotype/assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Serve Vue app at /gene2phenotype/
    location /gene2phenotype/ {
        alias /usr/share/nginx/html/gene2phenotype/;
        try_files $uri $uri/ @fallback;
    }

    location @fallback {
        rewrite ^ /gene2phenotype/index.html last;
    }
}